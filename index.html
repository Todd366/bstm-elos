<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<meta name="theme-color" content="#0b0e0d">
<link rel="manifest" href="manifest.json">

<body>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<header class="topbar">
  <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">☰</button>
  <div class="brand">
    <span class="brand-mark">ELOS</span>
    <span class="brand-sub">BSTM Evolutionary Learning Operating System</span>
  </div>
  <div class="sync-indicator" id="syncIndicator" title="Local storage status">
    <span class="dot"></span><span id="syncText">Saved locally</span>
  </div>
</header>

<div class="shell">
  <nav id="sideNav" class="sidenav">
    <a href="#/dashboard" data-route="dashboard">🏠 Dashboard</a>
    <a href="#/new" data-route="new">➕ New Trial</a>
    <a href="#/observations" data-route="observations">📊 Observations</a>
    <a href="#/trials" data-route="trials">📚 Trials</a>
    <a href="#/patterns" data-route="patterns">🧩 Patterns</a>
    <a href="#/principles" data-route="principles">📜 Principles</a>
    <a href="#/ecosystem" data-route="ecosystem">🏢 Ecosystem</a>
    <a href="#/scorecard" data-route="scorecard">📊 Scorecard</a>
    <a href="#/sentinel" data-route="sentinel">🛡️ Sentinel</a>
  <a href="#/settings" data-route="settings">⚙️ Settings</a>
  </nav>

  <main id="view" class="view" tabindex="-1"></main>
</div>

<template id="tpl-field-audit-row">
  <div class="fa-row">
    <div class="fa-label"></div>
    <div class="fa-rate">
      <label><input type="radio" name="" value="Good"> G</label>
      <label><input type="radio" name="" value="Fair"> F</label>
      <label><input type="radio" name="" value="Poor"> P</label>
    </div>
    <input type="text" class="fa-note" placeholder="One line of proof / note">
  </div>
</template>

<script src="db.js"></script>
<script src="rooms.js"></script>
<script src="schema.js"></script>
<script src="markdown.js"></script>
<script src="scorecard.js"></script>
<script src="views.js"></script>
<script src="trialForm.js"></script>
<script src="observations.js"></script>
<script src="app.js"></script>
</body>
</html>
